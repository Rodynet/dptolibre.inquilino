<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Billetera V63</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-cyan: #00D1FF;
            --bg-white: #ffffff;
            --card-gray: #F8FAFC;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #cbd5e1;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: var(--bg-white);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        /* Tarjetas con esquinas apenas redondeadas */
        .dl-card {
            background: var(--card-gray);
            border-radius: 6px;
            border: 1px solid #f1f5f9;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .progress-bar {
            background: linear-gradient(90deg, #0055DD 0%, #00D1FF 100%);
        }

        .icon-circle {
            @apply w-12 h-12 rounded-full bg-white border border-slate-100 flex items-center justify-center text-[#0055DD] shadow-sm transition-all active:scale-90;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function DptoLibreApp() {
            const [view, setView] = useState('inicio'); 
            const [activeRole, setActiveRole] = useState('Inquilino');
            
            // Mock Data
            const [balance, setBalance] = useState(905430);
            const aportePropio = 893000;
            const gananciaIntereses = 12430.22;
            const score = 875;
            
            const properties = [
                { address: "Caseros 1230, 4B", role: "Inquilino", status: "Activo" },
                { address: "Av. Colón 450, 10C", role: "Propietario", status: "Alquilada" }
            ];

            // --- VISTA: INICIO ---
            const InicioView = () => (
                <div className="flex flex-col h-full animate-in">
                    <header className="bg-white px-5 pt-12 pb-6 flex justify-between items-center">
                        <div onClick={() => setView('perfil')} className="flex items-center gap-3 cursor-pointer group active:opacity-70 transition-opacity">
                            <div className="w-11 h-11 rounded-full border-2 border-[#0055DD] overflow-hidden shadow-md">
                                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150&h=150&fit=crop" alt="Perfil" />
                            </div>
                            <div className="flex flex-col">
                                <p className="text-sm font-bold text-slate-800 leading-none">Marcos Galperin <Icon name="chevron-right" size={14} className="inline opacity-40"/></p>
                                <div className="flex items-center gap-1 mt-1">
                                    <Icon name="sparkles" size={10} className="text-amber-500" />
                                    <span className="text-[10px] font-semibold text-slate-500">4.500 Millas • Platinum</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-4 text-slate-400">
                            <button onClick={() => alert("Score Compartido")}><Icon name="share-2" size={22} /></button>
                            <Icon name="bell" size={22} />
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar pb-32">
                        
                        {/* SECCIÓN BILLETERA (STRICT WHITE STYLE) */}
                        <div className="px-5 mb-6">
                            <div className="dl-card p-6 shadow-sm">
                                <div className="flex justify-between items-center mb-1">
                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest leading-none">Billetera Blindato</p>
                                    <div className="bg-emerald-100 text-emerald-700 text-[9px] font-black px-2 py-0.5 rounded uppercase">Rinde 81% anual</div>
                                </div>
                                
                                <div className="flex items-center gap-2 mt-2">
                                    <h2 className="text-4xl font-black text-slate-900 tracking-tighter">$ {balance.toLocaleString()}</h2>
                                    <Icon name="eye" size={20} className="text-slate-200" />
                                </div>

                                {/* Desglose de Dinero */}
                                <div className="mt-4 flex gap-4 border-t border-slate-100 pt-4">
                                    <div className="flex-1">
                                        <p className="text-[8px] font-black text-slate-400 uppercase">Tus aportes</p>
                                        <p className="text-sm font-bold text-slate-700">${aportePropio.toLocaleString()}</p>
                                    </div>
                                    <div className="w-[1px] bg-slate-100 h-6 mt-1"></div>
                                    <div className="flex-1">
                                        <p className="text-[8px] font-black text-slate-400 uppercase">Ganancia generada</p>
                                        <p className="text-sm font-black text-emerald-600">+${gananciaIntereses.toLocaleString()}</p>
                                    </div>
                                </div>

                                {/* Indicador de Meses Blindados */}
                                <div className="mt-6 p-4 bg-blue-50 border border-blue-100 rounded flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <Icon name="shield-check" className="text-[#0055DD]" size={24} />
                                        <div>
                                            <p className="text-xs font-black text-[#0055DD] uppercase">Tienes 2 meses blindados</p>
                                            <p className="text-[9px] text-indigo-400 font-bold">Resguardado: Mayo y Junio</p>
                                        </div>
                                    </div>
                                    <Icon name="info" size={14} className="text-indigo-300" />
                                </div>

                                {/* Botonera de Acciones */}
                                <div className="flex gap-4 mt-6">
                                    <div className="flex-1 flex flex-col items-center gap-2">
                                        <div className="w-full py-4 bg-[#0055DD] text-white rounded font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-blue-100 active:scale-95 transition-all cursor-pointer">
                                            <Icon name="plus" size={16} /> Ingresar
                                        </div>
                                        <span className="text-[8px] font-black text-amber-500 uppercase tracking-tighter">¡Gana 50 puntos hoy!</span>
                                    </div>
                                    <div className="flex-1 flex flex-col items-center gap-2">
                                        <div className="w-full py-4 bg-white border border-slate-200 text-slate-400 rounded font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all cursor-pointer">
                                            <Icon name="arrow-up-right" size={16} /> Retirar
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* ALQUILER PRÓXIMO */}
                        <div className="px-5 mb-6">
                            <div className="dl-card p-5 border-l-4 border-l-[#0055DD]">
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tu Alquiler Actual</p>
                                        <h4 className="text-lg font-bold text-slate-800 leading-none tracking-tight">Caseros 1230, 4B</h4>
                                        <p className="text-xs text-slate-400 mt-1">Inmobiliaria Raíces • Vence en 4 días</p>
                                    </div>
                                    <span className="bg-[#0055DD] text-white text-[9px] font-black px-2 py-1 rounded">ABRIL</span>
                                </div>
                                <div className="flex items-end justify-between border-t border-slate-50 pt-5">
                                    <div>
                                        <p className="text-2xl font-black text-slate-800">$ 450.000</p>
                                        <p className="text-[10px] font-bold text-emerald-500 mt-1 uppercase tracking-tighter">Dinero ganado por resguardo: +$12.450</p>
                                    </div>
                                    <button 
                                        onClick={() => setView('exito_pago')}
                                        className="bg-[#0D1B4B] text-white px-6 py-3 rounded font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all"
                                    >
                                        Pagar
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* PRÉSTAMO POR SCORE */}
                        <div className="px-5 mb-6">
                            <div className="dl-card p-5 bg-[#0D1B4B] text-white relative overflow-hidden">
                                <Icon name="zap" size={60} className="absolute right-[-10px] top-[-10px] opacity-10" />
                                <h4 className="text-sm font-bold mb-1 tracking-tight">Adelanto por Score Platinum</h4>
                                <p className="text-[10px] text-white/50 mb-4 leading-tight">¿No tienes para blindar Julio? Te adelantamos $450.000 al instante.</p>
                                <button className="w-full bg-white text-slate-900 py-3 rounded font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Solicitar Préstamo</button>
                            </div>
                        </div>

                        {/* RANKING CASA PROPIA */}
                        <div className="px-5 mb-8">
                            <div className="dl-card p-6">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center text-amber-500"><Icon name="home" /></div>
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-800 leading-tight">Ranking Hipotecario</h3>
                                        <p className="text-xs text-slate-400 font-medium italic">82% de confianza para tu casa propia</p>
                                    </div>
                                </div>
                                <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                    <div className="h-full progress-bar w-[82%] shadow-[0_0_10px_rgba(0,85,221,0.3)]"></div>
                                </div>
                            </div>
                        </div>

                        {/* SERVICIOS GRILLA */}
                        <div className="px-5 grid grid-cols-4 gap-y-6 pb-10">
                            {[
                                { label: 'Movimientos', icon: 'list-ordered', action: () => setView('movimientos') },
                                { label: 'Tickets', icon: 'wrench' },
                                { label: 'Bitácora', icon: 'camera' },
                                { label: 'Score', icon: 'award', action: () => alert("Score compartido!") }
                            ].map((s, i) => (
                                <div key={i} onClick={s.action} className="flex flex-col items-center gap-2 cursor-pointer active:opacity-50 transition-opacity">
                                    <div className="w-14 h-14 bg-white border border-slate-100 rounded-2xl flex items-center justify-center text-slate-400 shadow-sm"><Icon name={s.icon} size={24}/></div>
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">{s.label}</span>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );

            // --- VISTA: MOVIMIENTOS ---
            const MovimientosView = () => (
                <div className="flex flex-col h-full bg-white animate-in">
                    <header className="p-5 pt-12 flex items-center gap-4 border-b border-slate-50">
                        <button onClick={() => setView('inicio')} className="p-2 bg-slate-50 rounded-full text-slate-400 active:scale-90 transition-all"><Icon name="arrow-left" /></button>
                        <h2 className="text-lg font-bold text-slate-800">Tu actividad</h2>
                    </header>
                    <div className="flex-1 overflow-y-auto no-scrollbar p-5 space-y-6">
                        <div className="relative"><Icon name="search" className="absolute left-3 top-3.5 text-slate-300" size={16}/><input type="text" placeholder="Busca una operación" className="w-full bg-slate-50 p-3.5 pl-10 rounded-xl text-sm outline-none border border-slate-100 focus:border-[#0055DD]"/></div>
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Abril 2026</h3>
                        <div className="space-y-6">
                            {[
                                { t: "Pago de Alquiler", s: "- $ 450.000", desc: "Caseros 1230 - Abril", icon: "key", color: "text-red-500" },
                                { t: "Intereses Blindado", s: "+ $ 1.240", desc: "Rendimiento diario", icon: "trending-up", color: "text-emerald-500" },
                                { t: "Ingreso de dinero", s: "+ $ 150.000", desc: "Desde Alias propio", icon: "plus", color: "text-emerald-500" },
                                { t: "Armado de Blindaje", s: "OK", desc: "Mes Mayo asegurado", icon: "shield-check", color: "text-[#0055DD]" }
                            ].map((m, i) => (
                                <div key={i} className="flex justify-between items-center active:opacity-60 transition-opacity cursor-pointer">
                                    <div className="flex items-center gap-4">
                                        <div className="w-11 h-11 bg-slate-50 rounded flex items-center justify-center text-slate-400 border border-slate-100"><Icon name={m.icon} size={22}/></div>
                                        <div><p className="text-sm font-bold text-slate-800 leading-none mb-1">{m.t}</p><p className="text-[10px] text-slate-400 uppercase font-medium">{m.desc}</p></div>
                                    </div>
                                    <p className={`text-sm font-black ${m.color}`}>{m.s}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // --- VISTA: MI PERFIL ---
            const PerfilView = () => (
                <div className="flex flex-col h-full bg-[#F8FAFC] animate-in">
                    <header className="p-6 pt-12 flex justify-between items-center bg-white border-b border-slate-100">
                        <h2 className="text-lg font-bold text-slate-800 tracking-tight">Mi Perfil</h2>
                        <button onClick={() => setView('inicio')} className="p-2 bg-slate-50 rounded-full text-slate-400"><Icon name="x" size={24}/></button>
                    </header>
                    <div className="flex-1 overflow-y-auto no-scrollbar p-6 space-y-8">
                        <div className="flex items-center gap-4 bg-white p-6 rounded shadow-sm border border-slate-100">
                            <div className="w-20 h-20 rounded-full border-2 border-[#0055DD] p-1 bg-white overflow-hidden shadow-lg">
                                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150&h=150&fit=crop" className="w-full h-full rounded-full object-cover" />
                            </div>
                            <div><h3 className="text-xl font-black text-slate-800 leading-none mb-1 tracking-tighter">Marcos Galperin</h3><p className="text-xs text-slate-400 font-medium tracking-tight">marcos.g@mercadolibre.com</p></div>
                        </div>

                        <section>
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-1">Mis Activos y Roles</h4>
                            <div className="space-y-2">
                                {properties.map((p, i) => (
                                    <div key={i} className="p-4 bg-white border border-slate-100 rounded flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-slate-50 text-[#0055DD] rounded flex items-center justify-center border border-slate-50"><Icon name="home" size={18}/></div>
                                            <div><p className="text-sm font-bold text-slate-800 leading-none mb-1">{p.address}</p><p className="text-[9px] text-slate-400 font-bold uppercase">{p.role}</p></div>
                                        </div>
                                        <span className="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-tighter">{p.status}</span>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="space-y-2">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-1">Configuración</h4>
                            <button className="w-full bg-white p-5 border border-slate-100 rounded text-left text-sm font-bold text-slate-700 flex justify-between items-center active:bg-slate-50"><div className="flex items-center gap-4"><Icon name="plus-circle" className="text-indigo-400"/> Agregar Propiedad Nueva</div> <Icon name="chevron-right" size={16}/></button>
                            <button className="w-full bg-white p-5 border border-slate-100 rounded text-left text-sm font-bold text-slate-700 flex justify-between items-center active:bg-slate-50"><div className="flex items-center gap-4"><Icon name="key" className="text-indigo-400"/> Resetear Clave</div> <Icon name="chevron-right" size={16}/></button>
                            <button className="w-full bg-red-50 p-5 border border-red-100 rounded text-left text-sm font-black text-red-600 flex justify-between items-center mt-10 active:scale-95"><div className="flex items-center gap-4"><Icon name="user-x" /> Cancelar mi cuenta</div></button>
                        </section>
                    </div>
                </div>
            );

            // --- VISTA: ÉXITO PAGO ---
            const ExitoPagoView = () => (
                <div className="flex flex-col h-full bg-[#10B981] text-white items-center justify-center p-10 text-center">
                    <div className="w-28 h-28 bg-white rounded-full flex items-center justify-center mb-8 shadow-2xl animate-pop">
                        <Icon name="star" size={56} className="text-[#10B981] fill-[#10B981]" />
                    </div>
                    <h1 className="text-3xl font-black uppercase tracking-tighter leading-none mb-4">¡ALQUILER PAGADO!</h1>
                    <p className="text-emerald-50 font-medium mb-12 leading-relaxed">Has usado tu blindaje de Abril con éxito. <br/> Ganaste <strong>+500 Millas</strong> de reputación.</p>
                    
                    <div className="w-full bg-black/10 rounded-2xl p-6 border border-white/20 text-left">
                        <div className="flex justify-between items-end">
                            <div><p className="text-[10px] font-black uppercase opacity-60">Nuevo Rental Score</p><p className="text-4xl font-black text-white">{score + 25} pts</p></div>
                            <div className="flex flex-col items-end"><p className="text-emerald-300 font-black text-sm">+25</p><p className="text-[9px] font-black uppercase opacity-40">Impacto</p></div>
                        </div>
                    </div>

                    <div className="w-full space-y-4 mt-12">
                        <button onClick={() => alert("Score compartido!")} className="w-full bg-white text-emerald-700 py-5 rounded font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 shadow-xl"><Icon name="share-2" /> Compartir Score</button>
                        <button onClick={() => setView('inicio')} className="w-full bg-transparent border border-white/40 text-white py-5 rounded font-black text-xs uppercase tracking-widest">Volver al Inicio</button>
                    </div>
                </div>
            );

            return (
                <div className="mobile-shell flex flex-col">
                    {/* Notch Superior */}
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-black/5 rounded-b-3xl z-[150] flex items-center justify-center gap-2">
                        <div className="w-1.5 h-1.5 rounded-full bg-white/40"></div>
                        <div className="w-10 h-1 bg-white/40 rounded-full"></div>
                    </div>

                    {view === 'inicio' && <InicioView />}
                    {view === 'movimientos' && <MovimientosView />}
                    {view === 'perfil' && <PerfilView />}
                    {view === 'exito_pago' && <ExitoPagoView />}

                    {/* BOTTOM NAV ESTILO MP */}
                    {['inicio', 'movimientos'].includes(view) && (
                        <nav className="absolute bottom-0 w-full bg-white border-t border-slate-100 h-20 flex justify-around items-center px-2 z-[90] shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                            <div onClick={() => setView('inicio')} className={`flex flex-col items-center gap-1 flex-1 cursor-pointer transition-all ${view === 'inicio' ? 'text-[#0055DD] font-black' : 'text-slate-300 font-medium'}`}>
                                <Icon name="home" size={24} strokeWidth={view === 'inicio' ? 3 : 2} />
                                <span className="text-[10px]">Inicio</span>
                            </div>
                            <div onClick={() => setView('movimientos')} className={`flex flex-col items-center gap-1 flex-1 cursor-pointer transition-all ${view === 'movimientos' ? 'text-[#0055DD] font-black' : 'text-slate-300 font-medium'}`}>
                                <Icon name="file-search" size={24} strokeWidth={view === 'movimientos' ? 3 : 2} />
                                <span className="text-[10px]">Actividad</span>
                            </div>
                            <div className="flex-1 flex justify-center">
                                <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-lg border border-slate-50 -translate-y-4 active:scale-90 transition-transform">
                                    <Icon name="shield-check" size={30} className="text-[#0055DD]" strokeWidth={2.5} />
                                </div>
                            </div>
                            <div className="flex flex-col items-center gap-1 flex-1 text-slate-300">
                                <Icon name="tag" size={24} />
                                <span className="text-[10px] font-medium">Boutique</span>
                            </div>
                            <div onClick={() => setView('perfil')} className="flex flex-col items-center gap-1 flex-1 text-slate-300 cursor-pointer active:scale-110">
                                <Icon name="menu" size={24} />
                                <span className="text-[10px] font-medium">Más</span>
                            </div>
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreApp />);
    </script>
</body>
</html>
