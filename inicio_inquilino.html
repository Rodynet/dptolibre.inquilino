<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Dashboard Estilo Chime</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            /* Colores inspirados en Chime / DptoLibre */
            --chime-green: #21bf73;
            --chime-dark: #052b1b;
            --brand-blue: #0055DD;
            --brand-dark: #0D1B4B;
            --bg-gray: #f2f5f7;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #cbd5e1;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: var(--bg-gray);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Chime Header Style */
        .chime-header {
            background-color: var(--chime-green);
            padding-top: 50px;
            padding-bottom: 80px;
        }

        /* Chime Card Style: Barely rounded */
        .chime-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eef0f2;
        }

        .balance-main {
            letter-spacing: -1.5px;
            font-weight: 800;
        }

        .nav-active {
            color: var(--chime-green);
            border-top: 3px solid var(--chime-green);
        }

        /* Gauge similar a Credit Score de Chime */
        .gauge-svg {
            transform: rotate(-180deg);
        }

        .gold-border {
            border: 1px solid #ffd700;
            background: linear-gradient(135deg, #ffffff 0%, #fffdf0 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function DptoLibreChime() {
            const [hasContract, setHasContract] = useState(true);

            return (
                <div className="mobile-shell flex flex-col">
                    
                    {/* CHIME STYLE HEADER */}
                    <div className="chime-header px-6 relative flex flex-col gap-4">
                        <div className="flex justify-between items-center">
                            <div className="flex flex-col items-center gap-1 group">
                                <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white border border-white/30">
                                    <Icon name="shield-check" size={24} />
                                </div>
                                <span className="text-[7px] font-black text-white uppercase tracking-widest">Bóveda</span>
                            </div>
                            <div className="flex gap-4">
                                <Icon name="bell" size={24} className="text-white" />
                                <Icon name="settings" size={24} className="text-white" />
                            </div>
                        </div>
                        
                        <div>
                            <h1 className="text-2xl font-extrabold text-white">Welcome, Marcos</h1>
                            <p className="text-white/80 text-sm font-medium">Inquilino Platinum Member</p>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA (SCROLLABLE) */}
                    <main className="flex-1 overflow-y-auto no-scrollbar px-5 -mt-12 space-y-4 pb-28">
                        
                        {/* TOTAL BALANCE CARD */}
                        <div className="chime-card p-6 flex flex-col gap-4">
                            <div className="flex justify-between items-center text-slate-400">
                                <span className="text-xs font-bold uppercase tracking-wider">Total resguardado</span>
                                <Icon name="more-horizontal" size={20} />
                            </div>
                            <div>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-3xl balance-main text-slate-800">$405,430</span>
                                    <span className="text-xl font-bold text-slate-400">.22</span>
                                </div>
                                <div className="flex items-center gap-1 text-emerald-500 font-bold text-xs mt-1">
                                    <Icon name="trending-up" size={14} /> 
                                    <span>Up $1,240 (8.34%) today</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3 pt-2">
                                <div className="flex items-center gap-2">
                                    <Icon name="smile" size={16} className="text-amber-500" />
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-slate-800 leading-none">$1,900 / mo</span>
                                        <span className="text-[8px] font-medium text-slate-400 uppercase">Yield</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <Icon name="landmark" size={16} className="text-indigo-500" />
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-slate-800 leading-none">$400,000 / mo</span>
                                        <span className="text-[8px] font-medium text-slate-400 uppercase">Rent</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* MY ACCOUNTS SECTION */}
                        <div className="space-y-3">
                            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Mis Cuentas</h3>
                            
                            <div className="grid grid-cols-2 gap-3">
                                <div className="chime-card p-4">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Saldo Galicia</p>
                                    <p className="text-sm font-black text-slate-800 tracking-tight">$125,400</p>
                                    <p className="text-[8px] text-slate-300 font-bold mt-1">Galicia ··· 8901</p>
                                </div>
                                <div className="chime-card p-4">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Millas Blindato</p>
                                    <p className="text-sm font-black text-slate-800 tracking-tight">4,500</p>
                                    <p className="text-[8px] text-amber-500 font-bold mt-1 uppercase">Ready to redeem</p>
                                </div>
                            </div>
                        </div>

                        {/* RENTAL SCORE (CHIME CREDIT BUILDER STYLE) */}
                        <div className="chime-card p-6 flex items-center justify-between">
                            <div className="flex flex-col">
                                <h3 className="text-sm font-black text-slate-800 mb-1">Rental Score</h3>
                                <p className="text-xs text-slate-500 leading-tight">Excellent! You are in the top 5% of tenants.</p>
                                <button className="text-emerald-500 font-bold text-[10px] mt-4 uppercase flex items-center gap-1">
                                    View Score details <Icon name="chevron-right" size={12} />
                                </button>
                            </div>
                            <div className="relative flex items-center justify-center">
                                <svg className="w-24 h-24 gauge-svg">
                                    <circle cx="48" cy="48" r="38" stroke="#f1f5f9" strokeWidth="10" fill="transparent" strokeDasharray="120 240" strokeLinecap="round" />
                                    <circle cx="48" cy="48" r="38" stroke="#21bf73" strokeWidth="10" fill="transparent" strokeDasharray="100 240" strokeLinecap="round" />
                                </svg>
                                <span className="absolute text-xl font-black text-slate-800">820</span>
                            </div>
                        </div>

                        {/* FINANCIAL TOOLS / ACTIONS */}
                        <div className="space-y-3">
                            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Financial Tools</h3>
                            
                            <div className="chime-card divide-y divide-slate-50">
                                <div className="p-4 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-500">
                                            <Icon name="calendar" size={20} />
                                        </div>
                                        <div>
                                            <p className="text-xs font-black text-slate-800">Próximo Alquiler</p>
                                            <p className="text-[10px] text-slate-400">Caseros 1230, 4B · Due 05/04</p>
                                        </div>
                                    </div>
                                    <button className="bg-slate-100 text-slate-800 px-4 py-2 rounded-md font-black text-[10px] uppercase">Pagar</button>
                                </div>

                                <div className="p-4 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-orange-50 rounded-lg flex items-center justify-center text-orange-500">
                                            <Icon name="zap" size={20} />
                                        </div>
                                        <div>
                                            <p className="text-xs font-black text-slate-800">Racha de Blindaje</p>
                                            <p className="text-[10px] text-slate-400">3 Months Perfect Streak</p>
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-end">
                                        <span className="text-[10px] font-black text-orange-500">+500 Millas</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RAMPA HIPOTECARIA CARD */}
                        <div className="chime-card p-6 gold-border relative overflow-hidden">
                            <div className="absolute right-[-10px] top-[-10px] opacity-10">
                                <Icon name="landmark" size={100} className="text-[#aa771c]" />
                            </div>
                            <h3 className="text-sm font-black text-slate-800 mb-4 uppercase tracking-tighter">Camino a tu Casa Propia</h3>
                            <div className="flex justify-between text-[10px] font-bold uppercase mb-2">
                                <span className="text-[#aa771c]">82% Calificado</span>
                                <span className="text-slate-300">2 Payments left</span>
                            </div>
                            <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden mb-4">
                                <div className="h-full bg-amber-400 transition-all duration-1000" style={{width: '82%'}}></div>
                            </div>
                            <p className="text-[10px] text-slate-500 font-medium text-center">Your rental history is being shared with top banks.</p>
                        </div>

                        {/* MANAGEMENT SECTION */}
                        <div className="grid grid-cols-2 gap-3 pb-8">
                            <div className="chime-card p-4 flex flex-col gap-3">
                                <Icon name="wrench" size={20} className="text-slate-400" />
                                <p className="text-[10px] font-black text-slate-800 uppercase leading-none">Tickets Arreglos</p>
                                <span className="text-[8px] font-bold text-emerald-500 uppercase">1 Active ticket</span>
                            </div>
                            <div className="chime-card p-4 flex flex-col gap-3">
                                <Icon name="camera" size={20} className="text-slate-400" />
                                <p className="text-[10px] font-black text-slate-800 uppercase leading-none">Bitácora Estado</p>
                                <span className="text-[8px] font-bold text-indigo-500 uppercase">View check-in logs</span>
                            </div>
                        </div>

                    </main>

                    {/* CHIME STYLE BOTTOM NAV */}
                    <nav className="absolute bottom-0 w-full bg-white border-t border-slate-100 h-20 flex justify-around items-center px-2 shadow-lg">
                        <button className="flex flex-col items-center gap-1 nav-active pt-3 px-4 flex-1">
                            <Icon name="home" size={22} className="text-[#21bf73]" />
                            <span className="text-[10px] font-bold text-[#21bf73] uppercase tracking-tighter">Home</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-400 flex-1">
                            <Icon name="arrow-left-right" size={22} />
                            <span className="text-[10px] font-bold uppercase tracking-tighter">Transfer</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-400 flex-1">
                            <Icon name="users" size={22} />
                            <span className="text-[10px] font-bold uppercase tracking-tighter">Friends</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-400 flex-1">
                            <Icon name="map-pin" size={22} />
                            <span className="text-[10px] font-bold uppercase tracking-tighter">ATM Map</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreChime />);
    </script>
</body>
</html>
