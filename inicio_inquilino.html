<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Dashboard Flotante</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0A142F;
            --bg-gray: #F0F2F6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #cbd5e1;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: var(--bg-gray);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        /* Difuminado del Header */
        .diffused-header {
            background: linear-gradient(to bottom, 
                var(--brand-blue) 0%, 
                var(--brand-blue) 80%, 
                var(--bg-gray) 100%
            );
            padding-top: 50px;
            padding-bottom: 100px;
        }

        /* Geometría Chime: Cuadrada con leve redondeo */
        .floating-card {
            background: white;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s ease;
        }

        .floating-card:active {
            transform: scale(0.98);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .btn-primary {
            background-color: var(--brand-blue);
            border-radius: 6px;
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Badge de Millas */
        .miles-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .gold-progress {
            background: linear-gradient(90deg, #FFC107 0%, #FF8F00 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function DptoLibreV58() {
            return (
                <div className="mobile-shell flex flex-col">
                    
                    {/* CABECERA DIFUMINADA */}
                    <div className="diffused-header px-6 relative flex flex-col gap-6">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-xl border-2 border-white/40 overflow-hidden shadow-lg">
                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marcos" alt="Usuario" className="bg-white/10" />
                                </div>
                                <div className="flex flex-col">
                                    <h1 className="text-white font-black text-lg leading-none tracking-tight">Marcos G.</h1>
                                    <div className="miles-badge px-2 py-0.5 rounded-md mt-1 flex items-center gap-1">
                                        <Icon name="sparkles" size={10} className="text-amber-300" />
                                        <span className="text-[9px] font-black text-white uppercase tracking-tighter">4.500 Millas</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button className="p-2 bg-white/10 rounded-lg border border-white/20 text-white"><Icon name="bell" size={20}/></button>
                                <button className="p-2 bg-white/10 rounded-lg border border-white/20 text-white"><Icon name="settings" size={20}/></button>
                            </div>
                        </div>

                        {/* BANNER PUBLICITARIO / MISIONES */}
                        <div className="bg-[#0A142F] rounded-xl p-4 flex items-center gap-4 border border-white/10 shadow-2xl animate-in fade-in zoom-in duration-700">
                            <div className="w-10 h-10 bg-indigo-500/20 rounded-lg flex items-center justify-center text-indigo-400">
                                <Icon name="zap" size={22} />
                            </div>
                            <div className="flex-1">
                                <p className="text-white font-black text-[11px] uppercase tracking-widest">Misión: Seguro Hogar</p>
                                <p className="text-white/50 text-[9px] font-medium leading-tight">Activa tu cobertura técnica y gana 200XP adicionales hoy.</p>
                            </div>
                            <Icon name="chevron-right" size={16} className="text-white/20" />
                        </div>
                    </div>

                    {/* CONTENIDO CENTRAL (CON OVERLAP) */}
                    <main className="flex-1 overflow-y-auto no-scrollbar px-5 -mt-16 space-y-5 pb-28">
                        
                        {/* 1. CUADRO PRINCIPAL FLOTANTE (OVERLAP) */}
                        <div className="floating-card p-6 z-10 relative">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Tu Resguardo Total</p>
                                    <div className="flex items-baseline gap-1 mt-2">
                                        <span className="text-4xl font-black text-slate-800 tracking-tighter">$405.430</span>
                                        <span className="text-xl font-bold text-slate-300">.22</span>
                                    </div>
                                </div>
                                <div className="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-[#0055DD]">
                                    <Icon name="shield-check" size={24} />
                                </div>
                            </div>

                            <div className="bg-emerald-50/50 p-4 rounded-md border border-emerald-100 flex justify-between items-center mb-6">
                                <div className="flex gap-3 items-center">
                                    <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white shadow-sm">
                                        <Icon name="trending-up" size={16} />
                                    </div>
                                    <div>
                                        <p className="text-[9px] font-black text-slate-400 uppercase leading-none">Rendimiento</p>
                                        <p className="text-sm font-black text-emerald-600">+$1.240,00 hoy</p>
                                    </div>
                                </div>
                                <Icon name="info" size={14} className="text-emerald-300" />
                            </div>

                            <button className="btn-primary w-full py-4 flex items-center justify-center gap-3 shadow-lg shadow-blue-200">
                                <Icon name="plus-circle" size={18} />
                                <span>Blindar Dinero</span>
                            </button>
                        </div>

                        {/* 2. ALQUILERES ADELANTADOS (CON BENEFICIO) */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="floating-card p-4 bg-[#0D1B4B] text-white">
                                <div className="flex items-center gap-2 mb-3">
                                    <Icon name="calendar" size={16} className="text-[#00D1FF]" />
                                    <p className="text-[9px] font-black uppercase text-white/40 tracking-widest leading-none">En Reserva</p>
                                </div>
                                <p className="text-2xl font-black leading-none">2 Meses</p>
                                <p className="text-[10px] font-bold text-emerald-400 mt-3 leading-tight">
                                    Ganaste <span className="underline">$12.450</span> al resguardarlo.
                                </p>
                            </div>
                            <div className="floating-card p-4">
                                <div className="flex items-center gap-2 mb-3">
                                    <Icon name="award" size={16} className="text-indigo-500" />
                                    <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest leading-none">Rental Score</p>
                                </div>
                                <p className="text-2xl font-black text-slate-800 leading-none">850</p>
                                <div className="flex items-center gap-1 text-[9px] text-emerald-500 font-bold mt-3 uppercase tracking-tighter">
                                    <Icon name="trending-up" size={10} /> +12 este mes
                                </div>
                            </div>
                        </div>

                        {/* 3. PROGRESO CASA PROPIA (DUOLINGO STYLE) */}
                        <div className="floating-card p-5 border-l-4 border-l-amber-400">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-10 h-10 bg-amber-50 rounded-lg flex items-center justify-center text-amber-500 border border-amber-100">
                                    <Icon name="home" size={22} />
                                </div>
                                <div className="flex-1">
                                    <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest leading-none">Meta Casa Propia</h3>
                                    <p className="text-[9px] text-slate-400 font-bold uppercase mt-1">Estás muy cerca de calificar</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-[14px] font-black text-amber-600">82%</span>
                                </div>
                            </div>
                            <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                                <div className="h-full gold-progress shadow-[0_0_10px_rgba(255,193,7,0.3)] transition-all duration-1000" style={{width: '82%'}}></div>
                            </div>
                            <button className="w-full mt-4 py-2 text-[10px] font-black text-indigo-600 uppercase tracking-widest border border-indigo-100 rounded-md bg-indigo-50/30">Ver requisitos hipotecarios</button>
                        </div>

                        {/* 4. GESTIÓN DEL CONTRATO */}
                        <div className="space-y-3">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Administración de Unidad</h4>
                            <div className="floating-card p-5 flex items-center justify-between group">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center text-[#0D1B4B]">
                                        <Icon name="map-pin" size={24} />
                                    </div>
                                    <div>
                                        <h5 className="font-black text-slate-800 text-sm leading-none">Caseros 1230, 4B</h5>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase mt-1.5">Raíces Inmobiliaria</p>
                                    </div>
                                </div>
                                <Icon name="chevron-right" size={20} className="text-slate-200 group-hover:text-indigo-600" />
                            </div>
                        </div>

                        {/* PANELES DE ACCIÓN RÁPIDA */}
                        <div className="grid grid-cols-2 gap-3 pb-6">
                            <div className="floating-card p-4 flex flex-col gap-3">
                                <Icon name="wrench" size={20} className="text-slate-400" />
                                <p className="text-[10px] font-black text-slate-800 uppercase tracking-widest">Tickets</p>
                                <span className="text-[8px] font-bold text-emerald-500 uppercase">1 respondido</span>
                            </div>
                            <div className="floating-card p-4 flex flex-col gap-3">
                                <Icon name="camera" size={20} className="text-slate-400" />
                                <p className="text-[10px] font-black text-slate-800 uppercase tracking-widest">Bitácora</p>
                                <span className="text-[8px] font-bold text-slate-400 uppercase">Ver check-in</span>
                            </div>
                        </div>

                    </main>

                    {/* NAV BAR INFERIOR */}
                    <nav className="absolute bottom-0 w-full bg-white border-t border-slate-100 h-20 flex justify-around items-center px-2 shadow-[0_-10px_25px_rgba(0,0,0,0.05)] z-[50]">
                        <button className="flex flex-col items-center gap-1 pt-2 flex-1 border-t-4 border-t-[#0055DD] text-[#0055DD]">
                            <Icon name="home" size={22} strokeWidth={3} />
                            <span className="text-[9px] font-bold uppercase">Inicio</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-300 flex-1">
                            <Icon name="file-text" size={22} />
                            <span className="text-[9px] font-bold uppercase">Admin</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-300 flex-1">
                            <Icon name="wallet" size={22} />
                            <span className="text-[9px] font-bold uppercase">Billetera</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-300 flex-1">
                            <Icon name="gift" size={22} />
                            <span className="text-[9px] font-bold uppercase">Millas</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreV58 />);
    </script>
</body>
</html>
