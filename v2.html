<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Ecosistema de Alquiler</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --brand-blue: #0055DD; --brand-dark: #0D1B4B; --brand-cyan: #00D1FF; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #E8EAF0; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .mobile-shell { width: 100%; height: 100vh; max-width: 414px; margin: 0 auto; background: #F0F2F6; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .passport-gradient { background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%); }
        .face-guide { width: 220px; height: 220px; border: 4px solid var(--brand-cyan); border-radius: 50%; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); }
        .logo-font { letter-spacing: -0.05em; font-weight: 800; }
        .blur-locked { filter: grayscale(1) opacity(0.4); pointer-events: none; }
        .btn-google { background: #FFFFFF; color: #1f2937; border: 1px solid #e5e7eb; }
        .btn-apple { background: #000000; color: #FFFFFF; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            // VIEWS: login, role_selection, passport_invite, val_dni_f, val_dni_d, val_face, val_income, val_history, home
            const [view, setView] = useState('login'); 
            const [valStep, setValStep] = useState(1);
            const [hasContract, setHasContract] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [isFirstRental, setIsFirstRental] = useState(false);

            const handleScanAction = (nextView) => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    setView(nextView);
                }, 1800);
            };

            // --- VISTAS ONBOARDING (MANTENIDAS) ---
            const LoginView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center animate-in">
                    <div className="mb-12 text-center"><Logo size="lg" /><h1 className="text-2xl font-black mt-8 text-[#0D1B4B] uppercase tracking-tighter">Bienvenido</h1></div>
                    <div className="space-y-3 w-full">
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold btn-google shadow-sm active:scale-95 transition-all">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.8c.86-2.59 3.29-4.51 6.16-4.51z" fill="#EA4335"/></svg>
                            Continuar con Google
                        </button>
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold btn-apple shadow-lg active:scale-95 transition-all"><Icon name="apple" size={20} className="fill-white"/> Continuar con Apple</button>
                        <div className="flex items-center gap-4 py-4"><div className="h-[1px] flex-1 bg-slate-100"></div><span className="text-[10px] font-black text-slate-300 uppercase">o con email</span><div className="h-[1px] flex-1 bg-slate-100"></div></div>
                        <input type="email" placeholder="Email" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-[#0055DD] outline-none" />
                        <button onClick={() => setView('role_selection')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl mt-4">Ingresar</button>
                    </div>
                </div>
            );

            const DniCapture = ({ side, next }) => (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-8 pb-4 flex justify-between items-center"><div><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter">DNI {side}</h2><p className="text-slate-400 text-xs font-bold uppercase mt-1">Identidad</p></div></header>
                    <main className="flex-1 p-8 flex flex-col justify-center text-center">
                        <div className="w-full aspect-[3/2] bg-slate-900 rounded-[2rem] border-4 border-[#0055DD]/10 relative flex flex-col items-center justify-center overflow-hidden shadow-2xl">
                             <div className="w-full h-1 bg-[#00D1FF]/40 absolute top-1/2 shadow-[0_0_20px_#00D1FF]"></div>
                             <Icon name="camera" className="text-white opacity-20" size={48} />
                        </div>
                        <button onClick={() => handleScanAction(next)} className="mt-auto w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Capturar Foto</button>
                    </main>
                </div>
            );

            const FaceCapture = () => (
                <div className="mobile-shell bg-slate-900 flex flex-col items-center justify-center text-white animate-in">
                    <div className="face-guide flex items-center justify-center"><Icon name="user" size={100} className="text-white/20" /></div>
                    <div className="mt-12 text-center px-10"><h4 className="text-xl font-black uppercase tracking-widest mb-2">Prueba de Vida</h4><p className="text-white/50 text-sm leading-relaxed">Mantené tu rostro centrado y parpadeá tres veces.</p></div>
                    <button onClick={() => handleScanAction('val_income')} className="mt-16 bg-[#00D1FF] text-[#0D1B4B] px-12 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Iniciar Escaneo</button>
                </div>
            );

            // --- VISTA HOME DINÁMICA (SR V20.0 + V24.0) ---
            const HomeView = () => (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in">
                    
                    {/* MARCO FIJO SUPERIOR (3.1) */}
                    <header className="bg-white px-5 py-4 flex justify-between items-center border-b border-slate-100 z-50 shadow-sm pt-12">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-slate-200 border-2 border-[#0055DD] overflow-hidden">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marcos" alt="User" />
                            </div>
                            <div className="flex flex-col">
                                <span className="text-xs font-black text-slate-800 leading-none uppercase">Marcos G.</span>
                                <span className="text-[8px] font-bold text-[#0055DD] uppercase mt-1 bg-blue-50 px-1.5 py-0.5 rounded">Inquilino Gold</span>
                            </div>
                        </div>

                        {/* ICONO CENTRAL CAJA FUERTE */}
                        <div className="absolute left-1/2 -translate-x-1/2 -translate-y-1">
                            <button className="flex flex-col items-center gap-0.5 group">
                                <div className="w-12 h-12 bg-[#0D1B4B] text-[#00D1FF] rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 group-active:scale-90 transition-transform">
                                    <Icon name="shield-check" size={28} />
                                </div>
                                <span className="text-[7px] font-black text-[#0D1B4B] uppercase tracking-tighter">Caja Fuerte</span>
                            </button>
                        </div>

                        <div className="flex items-center gap-3">
                            <div className="relative">
                                <Icon name="bell" size={22} className="text-slate-400" />
                                <div className="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></div>
                            </div>
                        </div>
                    </header>

                    {/* CUERPO CENTRAL SCROLLABLE */}
                    <main className="flex-1 overflow-y-auto no-scrollbar p-5 space-y-6 pb-28">
                        
                        {/* 2.1 DASHBOARD DE SCORE Y MILLAS */}
                        <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 flex justify-around items-center">
                            <div className="text-center">
                                <div className="w-16 h-16 rounded-full border-4 border-emerald-500 flex items-center justify-center">
                                    <span className="text-xl font-black text-slate-800">820</span>
                                </div>
                                <span className="text-[8px] font-black text-slate-400 uppercase mt-2 block tracking-widest">Score</span>
                            </div>
                            <div className="w-[1px] h-10 bg-slate-100"></div>
                            <div className="text-center">
                                <div className="w-16 h-16 rounded-full border-4 border-amber-400 flex items-center justify-center">
                                    <span className="text-xl font-black text-slate-800">4.5k</span>
                                </div>
                                <span className="text-[8px] font-black text-slate-400 uppercase mt-2 block tracking-widest">Millas</span>
                            </div>
                        </div>

                        {/* 2.2 WALLET DE ORQUESTACIÓN (BaaS + FCI) */}
                        <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden active:scale-95 transition-transform">
                            <Icon name="trending-up" size={140} className="absolute right-[-30px] bottom-[-30px] text-white/5" />
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <p className="text-[10px] font-black uppercase text-[#00D1FF] tracking-widest">Tu Billetera Galicia</p>
                                    <h3 className="text-2xl font-black mt-1">$125.400</h3>
                                </div>
                                <button className="bg-indigo-600 p-2.5 rounded-xl shadow-lg"><Icon name="plus" size={18}/></button>
                            </div>
                            <div className="bg-white/10 p-4 rounded-[1.5rem] flex items-center justify-between backdrop-blur-md border border-white/10">
                                <div>
                                    <span className="text-[9px] font-black uppercase text-emerald-400">Blindado y Rindiendo</span>
                                    <p className="text-lg font-black">$405.430 <span className="text-[10px] font-bold opacity-60">FCI</span></p>
                                </div>
                                <div className="text-right">
                                    <span className="text-[8px] font-black text-slate-400 uppercase">Intereses Hoy</span>
                                    <p className="text-xs font-black text-[#00D1FF]">+$1.240</p>
                                </div>
                            </div>
                        </div>

                        {/* 2.3 TARJETAS DE ACCIÓN */}
                        <div className="space-y-4">
                            
                            {/* T1: PAGO / LIBERACIÓN */}
                            {!hasContract ? (
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 text-center space-y-4 shadow-sm">
                                    <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto text-slate-300">
                                        <Icon name="file-search" size={32} />
                                    </div>
                                    <div>
                                        <h4 className="font-black text-[#0D1B4B] uppercase text-sm tracking-tight">Vincular Contrato</h4>
                                        <p className="text-xs text-slate-400 mt-1 leading-relaxed">Escaneá el QR de la inmobiliaria para activar tu gestión.</p>
                                    </div>
                                    <button onClick={() => setHasContract(true)} className="w-full bg-[#0055DD] text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-xl flex items-center justify-center gap-2">
                                        <Icon name="qr-code" size={18}/> ESCANEAR QR CONTRATO
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col gap-4 animate-in">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <span className="bg-emerald-100 text-emerald-700 text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest">Faltan 4 días</span>
                                            <h4 className="font-black text-slate-800 mt-2 text-lg">Caseros 1230, 4B</h4>
                                        </div>
                                        <Icon name="chevron-right" size={20} className="text-slate-300" />
                                    </div>
                                    <div className="flex items-center justify-between border-t pt-4">
                                        <p className="text-xl font-black text-slate-700">$450.000</p>
                                        <button className="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest">Pagar / Liberar</button>
                                    </div>
                                </div>
                            )}

                            {/* T2: GAMIFICACIÓN (RACHA) */}
                            <div className="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                                <Icon name="flame" size={80} className="absolute right-[-10px] top-[-10px] text-white/10" />
                                <h4 className="text-[10px] font-black uppercase tracking-widest opacity-80 mb-4">Racha Activa: 3 Meses</h4>
                                <div className="flex justify-between text-[10px] font-bold mb-2 uppercase">
                                    <span>Incentivo Early-Pay</span>
                                    <span className="text-amber-300">¡Activo!</span>
                                </div>
                                <div className="h-2.5 bg-white/20 rounded-full overflow-hidden mb-4">
                                    <div className="h-full bg-emerald-400" style={{ width: '45%' }}></div>
                                </div>
                                <p className="text-[10px] font-bold leading-tight opacity-90 italic">Pagá antes del viernes y ganá 500 Millas adicionales.</p>
                            </div>

                            {/* FUNCIONES BLOQUEADAS / ACTIVAS */}
                            <div className={`grid grid-cols-2 gap-4 ${!hasContract ? 'blur-locked' : ''}`}>
                                <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm flex flex-col gap-3">
                                    <Icon name="wrench" className="text-slate-400" />
                                    <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Tickets</p>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm flex flex-col gap-3">
                                    <Icon name="camera" className="text-slate-400" />
                                    <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Bitácora</p>
                                </div>
                            </div>
                        </div>

                        {/* RAMPA HIPOTECARIA (SIEMPRE ACTIVA) */}
                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
                            <Icon name="target" className="absolute right-4 top-4 text-indigo-500 opacity-20" size={64}/>
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Camino a tu Casa Propia</h4>
                            <div className="h-4 bg-slate-50 rounded-full overflow-hidden mb-4 border p-1">
                                <div className="h-full bg-gradient-to-r from-[#0055DD] to-emerald-400 rounded-full shadow-[0_0_10px_rgba(0,85,221,0.3)]" style={{ width: '65%' }}></div>
                            </div>
                            <p className="text-[9px] text-slate-500 font-bold italic leading-relaxed">"Estás a 3 meses de racha perfecta para calificar a tu Pre-aprobación Hipotecaria."</p>
                        </div>
                    </main>

                    {/* MARCO FIJO INFERIOR (V20.0) */}
                    <nav className="absolute bottom-0 w-full glass border-t border-slate-100 p-5 pb-10 flex justify-around bg-white/90 backdrop-blur-md">
                        <button className="text-[#0055DD] flex flex-col items-center gap-1 transition-all scale-110"><Icon name="home" strokeWidth={3}/><span className="text-[8px] font-black uppercase">Inicio</span></button>
                        <button className="text-slate-300 flex flex-col items-center gap-1"><Icon name="file-text" /><span className="text-[8px] font-black uppercase">Admin</span></button>
                        <button className="text-slate-300 flex flex-col items-center gap-1"><Icon name="wallet" /><span className="text-[8px] font-black uppercase">Wallet</span></button>
                        <button className="text-slate-300 flex flex-col items-center gap-1"><Icon name="gift" /><span className="text-[8px] font-black uppercase">Millaje</span></button>
                    </nav>
                </div>
            );

            // --- LÓGICA DE ROUTING ---
            const LoadingOverlay = () => (<div className="absolute inset-0 bg-white/90 backdrop-blur-md z-[200] flex flex-col items-center justify-center animate-in"><div className="w-16 h-16 border-4 border-[#0055DD] border-t-transparent rounded-full animate-spin mb-4"></div><p className="text-xs font-black text-[#0055DD] uppercase tracking-widest animate-pulse">Procesando...</p></div>);

            if (view === 'login') return <LoginView />;
            if (view === 'role_selection') return (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-12 pt-10 text-center"><h2 className="text-3xl font-black text-[#0D1B4B] tracking-tighter">¿Cuál es tu rol?</h2></header>
                    <div className="space-y-4 flex-1">
                        {['Inquilino', 'Propietario', 'Administrador'].map(r => (
                            <button key={r} onClick={() => setView('passport_invite')} className="w-full p-6 border-2 border-slate-50 rounded-[2.5rem] text-left flex items-center gap-5 hover:border-[#0055DD] hover:bg-blue-50/30 transition-all group">
                                <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 group-hover:bg-[#0055DD] group-hover:text-white transition-all"><Icon name={r === 'Inquilino' ? 'user' : r === 'Propietario' ? 'shield' : 'building'} /></div>
                                <div className="flex-1 font-black text-[#0D1B4B] uppercase text-sm">{r}</div>
                                <Icon name="chevron-right" className="text-slate-200 group-hover:text-[#0055DD]" />
                            </button>
                        ))}
                    </div>
                </div>
            );
            if (view === 'passport_invite') return (
                <div className="mobile-shell passport-gradient flex flex-col justify-center items-center p-12 text-center text-white animate-in">
                    <Logo light size="lg" />
                    <h2 className="text-3xl font-black mt-12 uppercase tracking-tighter leading-none">Obtené tu Pasaporte</h2>
                    <p className="text-white/60 text-sm mt-6 leading-relaxed px-4">Para operar en la plataforma, primero debés validar tu identidad y solvencia financiera.</p>
                    <button onClick={() => setView('val_dni_f')} className="w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl mt-12">Empezar Validación</button>
                </div>
            );
            if (view === 'val_dni_f') return <DniCapture side="Frente" next="val_dni_d" />;
            if (view === 'val_dni_d') return <DniCapture side="Dorso" next="val_face" />;
            if (view === 'val_face') return <FaceCapture />;
            if (view === 'val_income') return (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in overflow-y-auto no-scrollbar">
                    <header className="mb-10"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Tus Ingresos</h2></header>
                    <div className="space-y-6 flex-1">
                        <div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 space-y-4">
                            <h4 className="font-black text-[#0D1B4B] text-xs uppercase tracking-widest">Recibos de Sueldo</h4>
                            <button className="w-full p-4 border-2 border-dashed border-indigo-200 rounded-2xl flex items-center justify-center gap-3 text-indigo-500 font-bold text-xs uppercase bg-white"><Icon name="plus" size={18}/> Subir PDF o Fotos</button>
                        </div>
                    </div>
                    <button onClick={() => setView('val_history')} className="mt-8 w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Continuar</button>
                </div>
            );
            if (view === 'val_history') return (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in">
                    <header className="mb-10"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Trayectoria</h2></header>
                    <div className="flex-1 space-y-6">
                        <button onClick={() => setIsFirstRental(!isFirstRental)} className={`w-full p-6 border-2 rounded-[2rem] flex items-center gap-4 transition-all ${isFirstRental ? 'bg-emerald-50 border-emerald-500' : 'bg-slate-50 border-slate-100'}`}><Icon name="check" className={isFirstRental ? 'text-emerald-500' : 'text-slate-300'}/><div className="text-left"><h4 className="font-black text-slate-800 text-xs uppercase">Primer Alquiler</h4></div></button>
                        {!isFirstRental && <input type="text" placeholder="Último domicilio alquilado" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold" />}
                    </div>
                    <button onClick={() => setView('home')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Finalizar Pasaporte</button>
                </div>
            );
            if (view === 'home') return <HomeView />;
            
            return <div className="mobile-shell bg-white"><LoadingOverlay /></div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DptoLibreApp />);
    </script>
</body>
</html>
