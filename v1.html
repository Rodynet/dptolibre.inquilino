<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Cierre de Contrato</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --brand-blue: #0055DD; --brand-dark: #0D1B4B; --brand-cyan: #00D1FF; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #E8EAF0; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .mobile-shell { width: 100%; height: 100vh; max-width: 414px; margin: 0 auto; background: #F0F2F6; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .passport-gradient { background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%); }
        .logo-font { letter-spacing: -0.05em; font-weight: 800; }
        .face-guide { width: 200px; height: 200px; border: 3px solid var(--brand-cyan); border-radius: 50%; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
        .success-pulse { animation: successPulse 2s infinite; }
        @keyframes successPulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            // VIEWS: login, role, invite, val_dni_f, val_dni_d, val_face, val_income, val_history, contract_bridge, link_bank, payment, signature, home_active
            const [view, setView] = useState('login'); 
            const [isFirstRental, setIsFirstRental] = useState(false);
            const [isScanning, setIsScanning] = useState(false);

            const handleScan = (next) => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    setView(next);
                }, 1500);
            };

            // --- 1. LOGIN SCREEN ---
            const LoginView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center animate-in">
                    <div className="mb-12 text-center">
                        <Logo size="lg" />
                        <h1 className="text-2xl font-black mt-8 text-[#0D1B4B] uppercase tracking-tighter leading-none">Comencemos</h1>
                        <p className="text-slate-400 text-sm mt-3 font-medium">Ingresá a tu pasaporte digital.</p>
                    </div>
                    <div className="space-y-4 w-full">
                        <button onClick={() => setView('role')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold bg-white border border-slate-200 text-slate-700 shadow-sm active:scale-95 transition-all">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.8c.86-2.59 3.29-4.51 6.16-4.51z" fill="#EA4335"/></svg>
                            Continuar con Google
                        </button>
                        <button onClick={() => setView('role')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold bg-black text-white shadow-lg active:scale-95 transition-all">
                            <Icon name="apple" size={20} className="fill-white"/> Continuar con Apple
                        </button>
                        <div className="flex items-center gap-4 py-4"><div className="h-[1px] flex-1 bg-slate-100"></div><span className="text-[10px] font-black text-slate-300 uppercase">o con email</span><div className="h-[1px] flex-1 bg-slate-100"></div></div>
                        <input type="email" placeholder="Email" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium" />
                        <button onClick={() => setView('role')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Ingresar</button>
                    </div>
                </div>
            );

            // --- 2. ROLE SELECTION ---
            const RoleView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-12 pt-10 text-center">
                        <h2 className="text-3xl font-black text-[#0D1B4B] tracking-tighter">¿Cuál es tu rol?</h2>
                        <p className="text-slate-400 text-sm mt-4 font-medium">Personalizaremos tu experiencia según tu necesidad.</p>
                    </header>
                    <div className="space-y-4 flex-1">
                        {['Inquilino', 'Propietario', 'Administrador'].map(r => (
                            <button key={r} onClick={() => setView('invite')} className="w-full p-6 border-2 border-slate-50 rounded-[2.5rem] text-left flex items-center gap-5 hover:border-[#0055DD] hover:bg-blue-50/30 transition-all group">
                                <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 group-hover:bg-[#0055DD] group-hover:text-white transition-all"><Icon name={r === 'Inquilino' ? 'user' : r === 'Propietario' ? 'shield' : 'building'} /></div>
                                <div className="flex-1 font-black text-[#0D1B4B] uppercase text-sm">{r}</div>
                                <Icon name="chevron-right" className="text-slate-200 group-hover:text-[#0055DD]" />
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- 3. PASSPORT INVITE ---
            const InviteView = () => (
                <div className="mobile-shell passport-gradient flex flex-col justify-center items-center p-12 text-center text-white animate-in">
                    <Logo light size="lg" />
                    <h2 className="text-3xl font-black mt-12 uppercase tracking-tighter">Tu Pasaporte</h2>
                    <p className="text-white/60 text-sm mt-6 leading-relaxed">Para alquilar y gestionar tus contratos, primero debés validar tu identidad y solvencia.</p>
                    <button onClick={() => setView('val_dni_f')} className="w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl mt-12">Empezar Validación</button>
                </div>
            );

            // --- 4. VALIDATION STEPS (DNI, FACE, INCOME, HISTORY) ---
            const ValDniFView = () => (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-8 pb-4 flex justify-between items-center">
                        <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter">DNI Frente</h2>
                        <span className="text-[10px] font-black text-slate-400 uppercase">1 de 5</span>
                    </header>
                    <main className="flex-1 p-8 flex flex-col justify-center">
                        <div className="w-full aspect-[3/2] bg-slate-900 rounded-[2rem] border-4 border-[#0055DD]/10 relative flex flex-col items-center justify-center overflow-hidden shadow-2xl">
                             <div className="w-full h-1 bg-[#00D1FF]/40 absolute top-1/2 shadow-[0_0_15px_#00D1FF]"></div>
                             <Icon name="camera" className="text-white opacity-20" size={48} />
                             <p className="absolute bottom-4 text-[8px] font-black text-white/40 uppercase tracking-widest">Encuadre el frente</p>
                        </div>
                        <button onClick={() => handleScan('val_dni_d')} className="mt-12 w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest">Capturar Foto</button>
                    </main>
                    {isScanning && <LoadingOverlay />}
                </div>
            );

            const ValFaceView = () => (
                <div className="mobile-shell bg-slate-900 flex flex-col animate-in items-center justify-center">
                    <div className="face-guide"></div>
                    <div className="mt-12 text-center px-10">
                        <h4 className="text-white font-black uppercase text-sm tracking-widest">Prueba de Vida</h4>
                        <p className="text-white/50 text-xs mt-2">Mantené el rostro dentro del círculo y parpadeá lentamente.</p>
                    </div>
                    <button onClick={() => handleScan('val_income')} className="mt-12 w-48 bg-[#00D1FF] text-[#0D1B4B] py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Iniciar Escaneo</button>
                    {isScanning && <LoadingOverlay />}
                </div>
            );

            const ValIncomeView = () => (
                <div className="mobile-shell bg-white flex flex-col animate-in p-8">
                    <header className="mb-10"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Tus Ingresos</h2><p className="text-slate-400 text-xs font-bold uppercase mt-2">Paso 4 de 5</p></header>
                    <div className="space-y-6 flex-1">
                        <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100 space-y-4">
                            <h4 className="font-black text-[#0D1B4B] text-xs uppercase tracking-widest">Mis Recibos (Tus o de terceros)</h4>
                            <button className="w-full p-4 border-2 border-dashed border-indigo-200 rounded-2xl flex items-center justify-center gap-2 text-indigo-400 font-bold text-xs uppercase"><Icon name="plus" size={16}/> Subir PDFs o Fotos</button>
                        </div>
                        <div className="p-6 bg-indigo-50 rounded-3xl border border-indigo-100 space-y-4">
                            <h4 className="font-black text-indigo-900 text-xs uppercase tracking-widest leading-none">Garantía de Terceros</h4>
                            <p className="text-[10px] text-indigo-500 font-medium leading-relaxed">¿Presentas una propiedad o recibos de un tercero? Enviales un link.</p>
                            <button className="w-full bg-[#0D1B4B] text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2"><Icon name="share-2" size={12}/> Compartir Invitación</button>
                        </div>
                    </div>
                    <button onClick={() => setView('val_history')} className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest">Continuar</button>
                </div>
            );

            const ValHistoryView = () => (
                <div className="mobile-shell bg-white flex flex-col animate-in p-8">
                    <header className="mb-10"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Tu Historial</h2><p className="text-slate-400 text-xs font-bold uppercase mt-2">Paso 5 de 5</p></header>
                    <div className="flex-1 space-y-6">
                        <div onClick={() => setIsFirstRental(!isFirstRental)} className={`p-6 border-2 rounded-[2rem] flex items-center gap-4 transition-all cursor-pointer ${isFirstRental ? 'bg-emerald-50 border-emerald-500' : 'bg-slate-50 border-slate-100'}`}>
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center ${isFirstRental ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-400'}`}><Icon name="check" size={16}/></div>
                            <div className="flex-1"><h4 className="font-black text-slate-800 text-xs uppercase leading-none">Es mi primer alquiler</h4><p className="text-[10px] text-slate-400 font-bold mt-1">Habilitar modo aspirante.</p></div>
                        </div>
                        {!isFirstRental && <input type="text" placeholder="Último domicilio alquilado" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold" />}
                    </div>
                    <button onClick={() => setView('contract_bridge')} className="w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Finalizar Validación</button>
                </div>
            );

            // --- 5. CONTRACT BRIDGE (NEW: FOUND CONTRACT) ---
            const ContractBridgeView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center text-center animate-in">
                    <div className="w-20 h-20 bg-indigo-50 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-indigo-600 shadow-inner">
                        <Icon name="file-search" size={40} />
                    </div>
                    <h2 className="text-2xl font-black text-[#0D1B4B] tracking-tighter uppercase leading-tight">¡Contrato Encontrado!</h2>
                    <p className="text-slate-400 text-sm mt-4 leading-relaxed">
                        Detectamos que <strong>Inmobiliaria Raíces</strong> te ha asignado una propiedad: <br/> 
                        <span className="text-[#0055DD] font-bold">Caseros 1230, 4B</span>
                    </p>
                    <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 mt-8 space-y-3">
                         <div className="flex justify-between items-center text-xs"><span className="text-slate-400 uppercase font-black tracking-widest">Alquiler</span><span className="font-black text-slate-800">$450.000</span></div>
                         <div className="flex justify-between items-center text-xs"><span className="text-slate-400 uppercase font-black tracking-widest">Garantía</span><span className="font-black text-emerald-600">Aceptada</span></div>
                    </div>
                    <button onClick={() => setView('link_bank')} className="mt-12 w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Vincular mi Cuenta y Seguir</button>
                </div>
            );

            // --- 6. LINK BANK ACCOUNT ---
            const LinkBankView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-10 text-center pt-10"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter">Cuenta de Pago</h2><p className="text-slate-400 text-sm mt-2">Vinculá el CBU/Alias desde donde pagarás.</p></header>
                    <div className="space-y-6 flex-1">
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">CBU o Alias de tu banco</label>
                            <input type="text" placeholder="Ej: cuenta.pago.libre" className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl text-sm font-bold outline-none focus:border-[#0055DD]" />
                        </div>
                        <div className="bg-blue-50 p-5 rounded-3xl border border-blue-100 flex gap-4">
                             <Icon name="info" className="text-[#0055DD] shrink-0" />
                             <p className="text-[10px] text-[#0055DD] font-bold leading-relaxed">Solo podés vincular cuentas bajo tu mismo DNI (Validación COELSA automática).</p>
                        </div>
                    </div>
                    <button onClick={() => setView('payment')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Validar y Continuar</button>
                </div>
            );

            // --- 7. ENTRY PAYMENT (GASTOS DE INGRESO) ---
            const PaymentView = () => (
                <div className="mobile-shell bg-slate-900 text-white flex flex-col p-10 animate-in">
                    <header className="mb-8"><h2 className="text-2xl font-black uppercase tracking-tighter">Gastos de Ingreso</h2><p className="text-indigo-400 text-[10px] font-black uppercase tracking-widest mt-1">Liquidación Inmobiliaria</p></header>
                    <div className="flex-1 space-y-4">
                         {[
                            { l: 'Mes de Adelanto', v: 450000 },
                            { l: 'Informe Infoexperto', v: 4500 },
                            { l: 'Honorarios Admin', v: 22500 },
                            { l: 'Sellado de Ley', v: 12000 }
                         ].map((item, i) => (
                             <div key={i} className="flex justify-between items-center py-4 border-b border-white/10">
                                <span className="text-xs font-bold text-white/50 uppercase tracking-wider">{item.l}</span>
                                <span className="text-sm font-black">${item.v.toLocaleString()}</span>
                             </div>
                         ))}
                         <div className="pt-4 flex justify-between items-center text-emerald-400"><span className="text-xs font-black uppercase tracking-widest">Total a Pagar</span><span className="text-2xl font-black">$489.000</span></div>
                    </div>
                    <div className="bg-white/5 p-6 rounded-[2rem] border border-white/10 mb-8"><p className="text-[10px] font-bold text-white/40 leading-relaxed italic">Al presionar el botón, se orquestará la transferencia inmediata desde tu Banco Galicia hacia la cuenta de resguardo.</p></div>
                    <button onClick={() => setView('signature')} className="w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl">Confirmar y Pagar</button>
                </div>
            );

            // --- 8. DIGITAL SIGNATURE ---
            const SignatureView = () => (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-8 border-b border-slate-100 flex justify-between items-center"><h2 className="text-xl font-black text-[#0D1B4B] uppercase tracking-tighter">Firma de Contrato</h2><Icon name="lock" size={20} className="text-slate-400"/></header>
                    <main className="flex-1 overflow-y-auto p-8 space-y-6 bg-slate-50 no-scrollbar">
                        <div className="bg-white p-8 rounded-3xl shadow-sm text-[10px] text-slate-500 font-mono space-y-4 leading-relaxed border border-slate-100">
                             <p className="font-black text-[#0D1B4B] text-center uppercase border-b pb-4 mb-4">Contrato de Locación Estándar</p>
                             <p>Entre el Propietario (en adelante EL LOCADOR) y el Inquilino Marcos Galperin (en adelante EL LOCATARIO)...</p>
                             <p>PRIMERA: EL LOCADOR cede el uso de la unidad ubicada en Caseros 1230, 4B...</p>
                             <p>SEGUNDA: El plazo de locación es de 24 meses...</p>
                             <div className="h-40 flex items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl">Deslice para leer el contrato completo</div>
                        </div>
                    </main>
                    <footer className="p-8 bg-white border-t border-slate-100">
                        <button onClick={() => setView('home_active')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl flex items-center justify-center gap-3">
                            <Icon name="pen-tool" size={16} /> FIRMAR CON INFOEXPERTO-ID
                        </button>
                    </footer>
                </div>
            );

            // --- 9. HOME ACTIVA (FINAL DESTINATION) ---
            const HomeActiveView = () => (
                <div className="mobile-shell bg-[#F0F2F6] flex flex-col animate-in overflow-y-auto no-scrollbar pb-32">
                    <header className="p-8 bg-white border-b flex justify-between items-center sticky top-0 z-20"><Logo /><div className="w-10 h-10 rounded-full border-2 border-emerald-500 overflow-hidden bg-slate-100"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marcos" /></div></header>
                    <main className="p-6 space-y-6">
                        {/* Status Card Activa */}
                        <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                            <Icon name="shield-check" size={150} className="absolute right-[-40px] top-[-40px] opacity-10" />
                            <div className="flex justify-between items-start mb-10">
                                <span className="bg-emerald-500 text-[#0D1B4B] px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Alquiler Activo y Blindado</span>
                                <Icon name="qr-code" size={32} className="opacity-80" />
                            </div>
                            <h3 className="text-2xl font-black leading-tight">Caseros 1230, 4B</h3>
                            <p className="text-xs text-slate-400 mt-2">Próximo Vencimiento: 05 de Mayo</p>
                            <div className="mt-8 flex items-center justify-between border-t border-white/10 pt-6">
                                <div><p className="text-[8px] font-bold opacity-40 uppercase">Ahorro en Caja Fuerte</p><p className="text-lg font-black text-[#00D1FF]">+$1.240 <span className="text-[10px] opacity-60 font-bold">Rendimiento</span></p></div>
                                <button className="bg-white text-slate-900 px-6 py-3 rounded-xl font-black text-[10px] uppercase">Administrar</button>
                            </div>
                        </div>

                        {/* FUNCIONES DESBLOQUEADAS */}
                        <div className="space-y-4">
                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Mi Gestión</h4>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col gap-3 group active:scale-95 transition-all">
                                    <Icon name="wrench" className="text-[#0055DD]" />
                                    <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Tickets Arreglos</p>
                                </div>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col gap-3 group active:scale-95 transition-all">
                                    <Icon name="camera" className="text-[#0055DD]" />
                                    <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Bitácora Estado</p>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
                             <Icon name="trending-up" className="absolute right-4 top-4 text-emerald-500" />
                             <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Meta Casa Propia</h4>
                             <div className="h-3 bg-slate-50 rounded-full overflow-hidden mb-4 border p-0.5"><div className="h-full bg-gradient-to-r from-[#0055DD] to-emerald-400 rounded-full shadow-[0_0_10px_rgba(0,85,221,0.3)]" style={{ width: '82%' }}></div></div>
                             <p className="text-[9px] text-slate-500 font-bold italic leading-relaxed">"¡Felicidades Marcos! Con este contrato ya estás sumando antigüedad real para tu primer crédito hipotecario."</p>
