<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DptoLibre - Pasaporte Digital de Alquiler</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand-blue: #0055DD;
            --brand-dark: #0D1B4B;
            --brand-cyan: #00D1FF;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #E8EAF0;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 414px;
            margin: 0 auto;
            background: #F0F2F6;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .passport-gradient {
            background: linear-gradient(135deg, #0D1B4B 0%, #0055DD 100%);
        }

        .face-guide {
            width: 220px;
            height: 220px;
            border: 4px solid var(--brand-cyan);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.7);
        }

        .face-guide::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .logo-font {
            letter-spacing: -0.05em;
            font-weight: 800;
        }

        .btn-google { background: #FFFFFF; color: #1f2937; border: 1px solid #e5e7eb; }
        .btn-apple { background: #000000; color: #FFFFFF; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTE ICONO (LUCIDE) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- COMPONENTE LOGO ---
        const Logo = ({ light = false, size = "md" }) => (
            <div className={`flex flex-col items-center ${light ? 'text-white' : 'text-[#0D1B4B]'}`}>
                <svg width={size === "lg" ? "56" : "32"} viewBox="0 0 32 40" fill="none">
                    <path d="M16 0L32 6.4V33.6L16 40V6.4L16 0Z" fill={light ? "white" : "#0055DD"} fillOpacity="0.3"/>
                    <path d="M0 6.4L16 0V33.6L0 40V6.4Z" fill={light ? "white" : "#0055DD"}/>
                </svg>
                <div className={`logo-font ${size === "lg" ? 'text-2xl mt-2' : 'text-lg mt-1'}`}>
                    dpto <span className="font-light">libre</span>
                </div>
            </div>
        );

        function DptoLibreApp() {
            // VIEWS: login, role_selection, passport_invite, val_dni_f, val_dni_d, val_face, val_income, val_history, contract_bridge, link_bank, payment, signature, home_active
            const [view, setView] = useState('login'); 
            const [isFirstRental, setIsFirstRental] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [hasContract, setHasContract] = useState(true); // Simulamos que ya tiene un contrato asociado

            const handleScanAction = (nextView) => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    setView(nextView);
                }, 1800);
            };

            // --- 1. PANTALLA DE INGRESO ---
            const LoginView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center animate-in">
                    <div className="mb-12 text-center">
                        <Logo size="lg" />
                        <h1 className="text-2xl font-black mt-8 text-[#0D1B4B] uppercase tracking-tighter leading-none">Bienvenido</h1>
                        <p className="text-slate-400 text-sm mt-3 font-medium">Ingresá a tu pasaporte digital de alquiler.</p>
                    </div>

                    <div className="space-y-3 w-full">
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold btn-google shadow-sm active:scale-95 transition-all">
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.09H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.91l3.66-2.8z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.09l3.66 2.8c.86-2.59 3.29-4.51 6.16-4.51z" fill="#EA4335"/>
                            </svg>
                            Continuar con Google
                        </button>
                        <button onClick={() => setView('role_selection')} className="w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold btn-apple shadow-lg active:scale-95 transition-all">
                            <Icon name="apple" size={20} className="fill-white"/> Continuar con Apple
                        </button>
                        
                        <div className="flex items-center gap-4 py-4">
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                            <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">o con email</span>
                            <div className="h-[1px] flex-1 bg-slate-100"></div>
                        </div>

                        <input type="email" placeholder="Email" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-[#0055DD] outline-none" />
                        <button onClick={() => setView('role_selection')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl mt-4">Ingresar</button>
                    </div>
                </div>
            );

            // --- 2. SELECCIÓN DE ROL ---
            const RoleView = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-12 pt-10 text-center">
                        <h2 className="text-3xl font-black text-[#0D1B4B] tracking-tighter leading-none">¿Cómo vas a usar DptoLibre?</h2>
                        <p className="text-slate-400 text-sm mt-4 font-medium">Elegí tu perfil para comenzar.</p>
                    </header>
                    <div className="space-y-4 flex-1">
                        {[
                            { id: 'inq', label: 'Inquilino', desc: 'Busco alquilar o ya alquilo.', icon: 'user' },
                            { id: 'prop', label: 'Propietario', desc: 'Tengo propiedades para cobrar.', icon: 'shield' },
                            { id: 'adm', label: 'Administrador', desc: 'Gestiono carteras inmobiliarias.', icon: 'building' }
                        ].map(role => (
                            <button key={role.id} onClick={() => setView('passport_invite')} className="w-full p-6 border-2 border-slate-50 rounded-[2.5rem] text-left flex items-center gap-5 hover:border-[#0055DD] hover:bg-blue-50/30 transition-all group">
                                <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 group-hover:bg-[#0055DD] group-hover:text-white transition-all"><Icon name={role.icon} /></div>
                                <div className="flex-1">
                                    <h4 className="font-black text-[#0D1B4B] uppercase text-sm tracking-tight">{role.label}</h4>
                                    <p className="text-xs text-slate-400 font-medium">{role.desc}</p>
                                </div>
                                <Icon name="chevron-right" className="text-slate-200 group-hover:text-[#0055DD]" />
                            </button>
                        ))}
                    </div>
                </div>
            );

            // --- 3. INVITACIÓN PASAPORTE (OBLIGATORIA) ---
            const PassportInvite = () => (
                <div className="mobile-shell passport-gradient flex flex-col justify-center items-center p-12 text-center text-white animate-in">
                    <Logo light size="lg" />
                    <h2 className="text-3xl font-black mt-12 uppercase tracking-tighter leading-none">Obtené tu Pasaporte</h2>
                    <p className="text-white/60 text-sm mt-6 leading-relaxed px-4">Para operar en la plataforma, primero debés validar tu identidad y solvencia financiera.</p>
                    <button onClick={() => setView('val_dni_f')} className="w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl mt-12">Empezar Validación</button>
                    <p className="mt-8 text-[10px] text-white/30 uppercase font-black tracking-widest">Validación Biométrica Oficial</p>
                </div>
            );

            // --- 4. PASO A PASO DE VALIDACIÓN ---
            const DniCapture = ({ side, next, stepNum }) => (
                <div className="mobile-shell bg-white flex flex-col animate-in">
                    <header className="p-8 pb-4 flex justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter">DNI {side}</h2>
                            <p className="text-slate-400 text-xs font-bold uppercase mt-1">Legajo de Identidad</p>
                        </div>
                        <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">{stepNum} de 5</span>
                    </header>
                    <main className="flex-1 p-8 flex flex-col justify-center text-center">
                        <div className="w-full aspect-[3/2] bg-slate-900 rounded-[2rem] border-4 border-[#0055DD]/10 relative flex flex-col items-center justify-center overflow-hidden shadow-2xl group">
                             <div className="w-full h-1 bg-[#00D1FF]/40 absolute top-1/2 shadow-[0_0_20px_#00D1FF]"></div>
                             <Icon name="camera" className="text-white opacity-20 group-hover:scale-110 transition-transform" size={48} />
                             <p className="absolute bottom-4 text-[8px] font-black text-white/40 uppercase tracking-widest">Colocá el {side} del documento</p>
                        </div>
                        <div className="mt-10 bg-blue-50 p-6 rounded-3xl border border-blue-100 flex gap-3 text-left">
                            <Icon name="info" className="text-[#0055DD] shrink-0" size={20} />
                            <p className="text-xs text-[#0055DD] font-bold leading-relaxed">Asegurate de que no haya reflejos y que el texto sea legible para nuestra IA.</p>
                        </div>
                        <button onClick={() => handleScanAction(next)} className="mt-auto w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Capturar Foto</button>
                    </main>
                </div>
            );

            const FaceCapture = () => (
                <div className="mobile-shell bg-slate-900 flex flex-col items-center justify-center text-white animate-in">
                    <div className="face-guide flex items-center justify-center">
                        <Icon name="user" size={100} className="text-white/20" />
                    </div>
                    <div className="mt-12 text-center px-10">
                        <h4 className="text-xl font-black uppercase tracking-widest mb-2">Prueba de Vida</h4>
                        <p className="text-white/50 text-sm leading-relaxed">Mantené tu rostro centrado y <span className="text-[#00D1FF] font-black">parpadeá tres veces</span> lentamente.</p>
                    </div>
                    <button onClick={() => handleScanAction('val_income')} className="mt-16 bg-[#00D1FF] text-[#0D1B4B] px-12 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Iniciar Escaneo</button>
                    <span className="absolute top-10 text-[10px] font-black text-white/30 uppercase tracking-widest">Paso 3 de 5</span>
                </div>
            );

            const IncomeCapture = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in overflow-y-auto no-scrollbar">
                    <header className="mb-10 flex justify-between items-end">
                        <div>
                            <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Tus Ingresos</h2>
                            <p className="text-slate-400 text-xs font-bold uppercase mt-2">Paso 4 de 5</p>
                        </div>
                        <Icon name="file-text" className="text-slate-200" size={40} />
                    </header>
                    <div className="space-y-6 flex-1">
                        <div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 space-y-4">
                            <h4 className="font-black text-[#0D1B4B] text-xs uppercase tracking-widest">Mis Recibos / Facturas</h4>
                            <button className="w-full p-4 border-2 border-dashed border-indigo-200 rounded-2xl flex items-center justify-center gap-3 text-indigo-500 font-bold text-xs uppercase bg-white hover:bg-indigo-50 transition-all"><Icon name="plus" size={18}/> Subir PDF o Fotos</button>
                        </div>
                        <div className="p-6 bg-indigo-50 rounded-[2rem] border-2 border-indigo-100 space-y-4">
                            <h4 className="font-black text-indigo-900 text-xs uppercase tracking-widest leading-none">Avales Adicionales</h4>
                            <p className="text-[10px] text-indigo-500 font-medium leading-relaxed">¿Sumás recibos de terceros o una propiedad? Enviales este link para que carguen su parte.</p>
                            <div className="grid grid-cols-2 gap-3">
                                <button className="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center gap-2 border border-indigo-100 active:scale-95 transition-all"><Icon name="user-plus" size={18} className="text-indigo-400"/><span className="text-[8px] font-black text-slate-500 uppercase">Garante</span></button>
                                <button className="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center gap-2 border border-indigo-100 active:scale-95 transition-all"><Icon name="building-2" size={18} className="text-indigo-400"/><span className="text-[8px] font-black text-slate-500 uppercase">Propiedad</span></button>
                            </div>
                            <button className="w-full bg-[#0D1B4B] text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2"><Icon name="share-2" size={12}/> Compartir Invitación</button>
                        </div>
                    </div>
                    <button onClick={() => setView('val_history')} className="mt-8 w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Continuar</button>
                </div>
            );

            const HistoryCapture = () => (
                <div className="mobile-shell bg-white flex flex-col p-8 animate-in">
                    <header className="mb-10 flex justify-between items-end">
                        <div>
                            <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-none">Trayectoria</h2>
                            <p className="text-slate-400 text-xs font-bold uppercase mt-2">Paso 5 de 5</p>
                        </div>
                        <Icon name="history" className="text-slate-200" size={40} />
                    </header>
                    <div className="flex-1 space-y-6">
                        <button 
                            onClick={() => setIsFirstRental(!isFirstRental)}
                            className={`w-full p-6 border-2 rounded-[2rem] flex items-center gap-4 transition-all ${isFirstRental ? 'bg-emerald-50 border-emerald-500' : 'bg-slate-50 border-slate-100'}`}
                        >
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center ${isFirstRental ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-200 text-slate-400'}`}>
                                <Icon name="check" size={18} strokeWidth={3}/>
                            </div>
                            <div className="text-left">
                                <h4 className="font-black text-slate-800 text-sm uppercase leading-none">Es mi primer alquiler</h4>
                                <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-tighter">No tengo historial en el sistema</p>
                            </div>
                        </button>
                        
                        {!isFirstRental && (
                            <div className="space-y-4 animate-in fade-in">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Última dirección alquilada</label>
                                    <input type="text" placeholder="Calle, Altura, Ciudad..." className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-[#0055DD] outline-none" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Referencia de contacto</label>
                                    <input type="text" placeholder="Inmobiliaria o Dueño directo" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-[#0055DD] outline-none" />
                                </div>
                            </div>
                        )}
                        <div className="bg-indigo-50 p-5 rounded-3xl border border-indigo-100 flex gap-4">
                             <Icon name="award" className="text-indigo-600 shrink-0" size={24} />
                             <p className="text-[10px] text-indigo-700 font-bold leading-relaxed">Declarar tu buen comportamiento anterior te habilita el nivel de Inquilino Platinum más rápido.</p>
                        </div>
                    </div>
                    <button onClick={() => setView('contract_bridge')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">Finalizar Pasaporte</button>
                </div>
            );

            // --- 5. DETECCIÓN DE CONTRATO ---
            const ContractBridge = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 justify-center text-center animate-in">
                    <div className="relative mb-8">
                        <div className="w-24 h-24 bg-indigo-50 rounded-[2.5rem] flex items-center justify-center mx-auto text-indigo-600 shadow-inner">
                            <Icon name="file-search" size={48} />
                        </div>
                        <div className="absolute top-0 right-[35%] bg-emerald-500 text-white p-2 rounded-full border-4 border-white shadow-lg"><Icon name="check" size={16} strokeWidth={4}/></div>
                    </div>
                    <h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter leading-tight">¡Contrato Vinculado!</h2>
                    <p className="text-slate-400 text-sm mt-4 leading-relaxed">
                        Detectamos un contrato activo de <strong>Inmobiliaria Raíces</strong> asignado a tu perfil:
                    </p>
                    <div className="bg-slate-900 rounded-[2rem] p-6 mt-8 text-white text-left shadow-2xl relative overflow-hidden">
                         <Icon name="building-2" size={80} className="absolute right-[-10px] bottom-[-10px] opacity-10" />
                         <p className="text-[10px] font-black uppercase text-indigo-400 mb-1">Propiedad</p>
                         <h4 className="text-lg font-bold mb-4">Caseros 1230, 4B</h4>
                         <div className="grid grid-cols-2 gap-4">
                             <div><p className="text-[8px] font-bold opacity-50 uppercase">Alquiler</p><p className="text-sm font-black text-emerald-400">$450.000</p></div>
                             <div><p className="text-[8px] font-bold opacity-50 uppercase">Expensas</p><p className="text-sm font-black">$65.000</p></div>
                         </div>
                    </div>
                    <button onClick={() => setView('link_bank')} className="mt-12 w-full bg-[#0055DD] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Continuar a Cuenta de Pago</button>
                </div>
            );

            // --- 6. VINCULACIÓN BANCARIA ---
            const LinkBank = () => (
                <div className="mobile-shell bg-white flex flex-col p-10 animate-in">
                    <header className="mb-10 text-center pt-10"><h2 className="text-2xl font-black text-[#0D1B4B] uppercase tracking-tighter">Cuenta de Pago</h2><p className="text-slate-400 text-sm mt-2">Vinculá el CBU/Alias desde donde pagarás cada mes.</p></header>
                    <div className="space-y-6 flex-1">
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">CBU o Alias de tu banco</label>
                            <input type="text" placeholder="Ej: marcos.galperin.banco" className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl text-sm font-bold focus:border-[#0055DD] outline-none" />
                        </div>
                        <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100 flex gap-4">
                             <Icon name="shield-check" className="text-emerald-600 shrink-0" />
                             <p className="text-[10px] text-emerald-700 font-bold leading-relaxed">Seguridad Blindato: Validamos la titularidad vía COELSA para que los pagos sean 100% digitales y sin errores.</p>
                        </div>
                    </div>
                    <button onClick={() => setView('payment')} className="w-full bg-[#0D1B4B] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Validar y Seguir</button>
                </div>
            );

            // --- 7. PAGO DE GASTOS DE INGRESO ---
            const PaymentView = () => (
                <div className="mobile-shell bg-slate-900 text-white flex flex-col p-10 animate-in overflow-y-auto no-scrollbar">
                    <header className="mb-8"><h2 className="text-2xl font-black uppercase tracking-tighter">Gastos de Ingreso</h2><p className="text-indigo-400 text-[10px] font-black uppercase tracking-widest mt-1">Liquidación para activación</p></header>
                    <div className="flex-1 space-y-4">
                         {[
                            { l: 'Mes de Adelanto', v: 450000 },
                            { l: 'Informe Infoexperto (Markup)', v: 5000 },
                            { l: 'Honorarios Gestión', v: 22500 },
                            { l: 'Firma Digital Certificada', v: 1200 }
                         ].map((item, i) => (
                             <div key={i} className="flex justify-between items-center py-4 border-b border-white/10">
                                <span className="text-xs font-bold text-white/50 uppercase tracking-wider">{item.l}</span>
                                <span className="text-sm font-black">${item.v.toLocaleString()}</span>
                             </div>
                         ))}
                         <div className="pt-6 flex justify-between items-center text-emerald-400"><span className="text-xs font-black uppercase tracking-widest">Total a Liquidar</span><span className="text-3xl font-black">$478.700</span></div>
                    </div>
                    <div className="bg-white/5 p-6 rounded-[2rem] border border-white/10 my-8 flex gap-3">
                         <Icon name="info" className="text-[#00D1FF] shrink-0" size={18}/>
                         <p className="text-[10px] font-bold text-white/40 leading-relaxed italic">Al confirmar, orquestaremos la transferencia desde tu Banco Galicia vinculado.</p>
                    </div>
                    <button onClick={() => setView('signature')} className="w-full bg-[#00D1FF] text-[#0D1B4B] py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Confirmar Pago de Ingreso</button>
                </div>
            );
